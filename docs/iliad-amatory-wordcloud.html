<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amatory Word Cloud · Iliad glosses</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#221f1a;
    --parchment:#e9e2cd;
    --parchment-2:#ddd3b6;
    --rubric:#8c3a2b;
    --verdigris:#5f7d63;
    --gold:#a9832f;
    --line: rgba(34,31,26,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    background-image: radial-gradient(rgba(34,31,26,0.05) 1px, transparent 1px);
    background-size: 3px 3px;
    color:var(--ink);
    font-family:'EB Garamond', serif;
    font-size:19px;
    line-height:1.5;
  }
  header{
    max-width:960px;
    margin:0 auto;
    padding:64px 24px 32px;
    border-bottom:2px solid var(--ink);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--verdigris);
    margin:0 0 10px;
  }
  h1{
    font-family:'Cormorant SC', serif;
    font-weight:700;
    font-size:50px;
    letter-spacing:0.02em;
    color:var(--rubric);
    margin:0 0 8px;
  }
  .subtitle{
    font-style:italic;
    color:#4a453b;
    margin:0 0 22px;
    max-width:66ch;
  }
  .subtitle code{
    font-family:'JetBrains Mono', monospace;
    font-style:normal;
    font-size:14px;
    background:var(--parchment-2);
    padding:1px 5px;
  }
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:14px 28px;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
  }
  button{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    background:var(--parchment-2);
    border:1px solid var(--ink);
    color:var(--ink);
    padding:6px 10px;
    cursor:pointer;
  }
  button:hover{ background:var(--gold); color:var(--parchment);}
  #status{ color:var(--verdigris); }
  main{
    max-width:960px;
    margin:0 auto;
    padding:24px 24px 100px;
  }
  #cloudWrap{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.15);
    margin-bottom:28px;
  }
  #cloudSvg text{
    cursor:default;
  }
  #cloudSvg text:hover{
    opacity:0.65;
  }
  details{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  summary{
    cursor:pointer;
    color:var(--verdigris);
    margin-bottom:10px;
  }
  .entry{
    padding:10px 0;
    border-bottom:1px dotted var(--line);
    font-family:'EB Garamond', serif;
    font-size:16px;
  }
  .entry .lemma{ font-style:italic; color:#4a453b; }
  .entry .meta{ color:#5c5647; font-family:'JetBrains Mono', monospace; font-size:11px; margin-top:4px;}
  .entry a{ color:var(--rubric); }
  .empty, .error{
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    color:var(--rubric);
    padding:30px 0;
  }
  #tokenChip{
    position:fixed; right:18px; bottom:18px; z-index:20;
    font-family:'JetBrains Mono', monospace; font-size:12px;
    background:var(--ink); color:var(--parchment);
    border:1px solid var(--gold); padding:7px 12px;
    cursor:pointer; user-select:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
  }
  #tokenChip:hover{ background:var(--rubric); }
  #tokenChip.set{ border-color:var(--verdigris); }
  .sitenav{
    max-width:960px; margin:0 auto; padding:14px 24px 0;
    font-family:'JetBrains Mono', monospace; font-size:12px;
    letter-spacing:.04em; text-transform:uppercase;
    color:#8a8168; display:flex; gap:.5rem; align-items:center;
  }
  .sitenav a{ color:#8a8168; text-decoration:none; }
  .sitenav a:hover{ color:var(--rubric); text-decoration:underline; }
  .sitenav a[aria-current="page"]{ color:var(--rubric); font-weight:600; pointer-events:none; }
  .legend{
    display:flex; flex-wrap:wrap; gap:10px 20px;
    font-family:'JetBrains Mono', monospace; font-size:12px;
    margin-top:16px; padding-top:14px; border-top:1px solid var(--line);
  }
  .legend .item{ display:flex; align-items:center; gap:6px; }
  .legend .dot{ width:11px; height:11px; border-radius:50%; border:1px solid rgba(0,0,0,.25); flex:none; }
  .legend .unclassified .dot{ background:#8a8168 !important; }
</style>
</head>
<body>

<div id="tokenChip" title="click: set/update your personal API token · double-click: hide until reload">🔑 token</div>

<nav class="sitenav" aria-label="Iliad translations">
  <a href="index.html">index</a>
  <span aria-hidden="true">·</span>
  <a href="iliad-eng.html">english</a>
  <span aria-hidden="true">·</span>
  <a href="tuscan-english-parallel.html">tuscan</a>
  <span aria-hidden="true">·</span>
  <a href="venetian-english-parallel.html">venetian</a>
  <span aria-hidden="true">·</span>
  <a href="iliad-amatory-wordcloud.html" aria-current="page">wordcloud</a>
</nav>

<header>
  <p class="eyebrow">Full corpus &middot; Hypothes.is</p>
  <h1>Amatory Word Cloud</h1>
  <p class="subtitle">All annotations (any tag) across the three Iliad 14 sources &mdash; each word colored by the text layer it glosses, sized by frequency within that layer.</p>
  <div class="controls">
    <span id="status">ready to query the API…</span>
    <button id="reload">↻ reload</button>
  </div>
  <div class="legend" id="legend"></div>
</header>

<main id="main">
  <p class="empty">Loading annotations…</p>
</main>

<script>
const GROUP_ID = "PmBAzYRr";
const API = "https://api.hypothes.is/api/search";
const PAGE_SIZE = 200;
const TOKEN_KEY = "hypothesis_api_token_iliad";
const BASE = "https://cophi.github.io/iliad-translations/";

// Five text layers, mapped 1:1 onto the fluo PALETTE of hypothesis-cat-color.js
// (same hue, desaturated S=0.55 / L=0.34 for readability on parchment).
const CATEGORIES = {
  eng:        { label: "Pope’s Eng",     color: "rgb(44, 124, 29)"  },
  tuscanSrc:  { label: "Tuscan (src)",    color: "rgb(124, 76, 29)"  },
  tuscanEng:  { label: "Tusc→Eng trot",   color: "rgb(124, 29, 87)"  },
  venSrc:     { label: "Venetian (src)",  color: "rgb(124, 124, 29)" },
  venEng:     { label: "Ven→Eng trot",    color: "rgb(29, 124, 124)" },
  unclassified:{ label: "unclassified",  color: "#8a8168" }
};

// Sources to query. Single-column sources map straight to one category;
// two-column (parallel) sources need per-annotation classification via
// the RangeSelector XPath: td[2] = original-language column (src),
// td[3] = English trot column (eng).
const SOURCES = [
  { uri: BASE + "iliad-eng.html", fixedCategory: "eng" },
  { uri: BASE + "tuscan-english-parallel.html", srcCategory: "tuscanSrc", engCategory: "tuscanEng" },
  { uri: BASE + "venetian-english-parallel.html", srcCategory: "venSrc", engCategory: "venEng" },
];

const STOPWORDS = new Set(("a about above after again against all am an and any are aren't as at be because been before being below between both but by can't cannot could couldn't did didn't do does doesn't doing don't down during each few for from further had hadn't has hasn't have haven't having he he'd he'll he's her here here's hers herself him himself his how how's i i'd i'll i'm i've if in into is isn't it it's its itself let's me more most mustn't my myself no nor not of off on once only or other ought our ours ourselves out over own same shan't she she'd she'll she's should shouldn't so some such than that that's the their theirs them themselves then there there's these they they'd they'll they're they've this those through to too under until up very was wasn't we we'd we'll we're we've were weren't what what's when when's where where's which while who who's whom why why's with won't would wouldn't you you'd you'll you're you've your yours yourself yourselves also one two upon thou thy thee ye o").split(/\s+/));

const mainEl = document.getElementById('main');
const statusEl = document.getElementById('status');
const tokenChip = document.getElementById('tokenChip');
const legendEl = document.getElementById('legend');

function getToken(){ return localStorage.getItem(TOKEN_KEY) || ''; }
function refreshChip(){
  tokenChip.classList.toggle('set', !!getToken());
  tokenChip.textContent = getToken() ? '🔑 token set' : '🔑 token';
}
tokenChip.addEventListener('click', () => {
  const current = getToken();
  const val = prompt(
    "Paste your personal Hypothes.is API token here\n" +
    "(Profile → Developer → Generate API token).\n" +
    "It stays only in this browser (localStorage), never sent anywhere\n" +
    "except in the Authorization header to api.hypothes.is.\n" +
    "Leave empty and confirm to remove it.",
    current
  );
  if(val === null) return;
  if(val.trim() === '') localStorage.removeItem(TOKEN_KEY);
  else localStorage.setItem(TOKEN_KEY, val.trim());
  refreshChip();
  load();
});
tokenChip.addEventListener('dblclick', (e) => { e.stopPropagation(); tokenChip.style.display = 'none'; });

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLegend(){
  legendEl.innerHTML = '';
  for(const key of ["eng","tuscanSrc","tuscanEng","venSrc","venEng","unclassified"]){
    const cat = CATEGORIES[key];
    const item = document.createElement('span');
    item.className = 'item' + (key === 'unclassified' ? ' unclassified' : '');
    const dot = document.createElement('span');
    dot.className = 'dot';
    if(key !== 'unclassified') dot.style.background = cat.color;
    const label = document.createElement('span');
    label.textContent = cat.label;
    item.appendChild(dot); item.appendChild(label);
    legendEl.appendChild(item);
  }
}

/** Fetches ALL annotations (no tag filter) for a single uri, paginated. */
async function fetchForUri(uri){
  let offset = 0, all = [], total = Infinity;
  const token = getToken();
  const headers = token ? { "Authorization": `Bearer ${token}` } : {};
  while (offset < total && offset < 5000){
    const url = `${API}?group=${GROUP_ID}&uri=${encodeURIComponent(uri)}&limit=${PAGE_SIZE}&offset=${offset}&_separate_replies=false`;
    const res = await fetch(url, { headers });
    if(res.status === 401 || res.status === 403){
      throw new Error(`access denied (HTTP ${res.status}) — the group is private: set a valid token with the 🔑 chip in the bottom right`);
    }
    if(!res.ok) throw new Error(`request failed: HTTP ${res.status}`);
    const data = await res.json();
    total = data.total ?? data.rows.length;
    all = all.concat(data.rows || []);
    if(!data.rows || data.rows.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
    statusEl.textContent = `fetched ${all.length} of ${total} annotations from ${uri.split('/').pop()}…`;
  }
  return all.filter(a => a.uri === uri);
}

/** Classifies a two-column-page annotation as src (td[2]) or eng (td[3])
 *  column by inspecting the RangeSelector XPath; 'unclassified' otherwise
 *  (e.g. a selection spanning both cells, or a page-level/root annotation). */
function classifyColumn(ann, srcCategory, engCategory){
  const target = (ann.target && ann.target[0]) || {};
  const selectors = target.selector || [];
  const range = selectors.find(s => s.type === 'RangeSelector');
  const path = range ? `${range.startContainer || ''} ${range.endContainer || ''}` : '';
  const hasSrc = /td\[2\]/.test(path);
  const hasEng = /td\[3\]/.test(path);
  if(hasSrc && !hasEng) return srcCategory;
  if(hasEng && !hasSrc) return engCategory;
  return 'unclassified';
}

/** Fetches and categorizes annotations from all SOURCES. Returns an array
 *  of { ann, category }. */
async function fetchAllCategorized(){
  const out = [];
  for(const src of SOURCES){
    const anns = await fetchForUri(src.uri);
    for(const ann of anns){
      const category = src.fixedCategory
        ? src.fixedCategory
        : classifyColumn(ann, src.srcCategory, src.engCategory);
      out.push({ ann, category });
    }
  }
  return out;
}

function buildFrequencies(categorized){
  // Map<category, Map<word,count>>
  const freq = new Map();
  for(const { ann, category } of categorized){
    if(!freq.has(category)) freq.set(category, new Map());
    const m = freq.get(category);
    const text = (ann.text || '').toLowerCase();
    const words = text.match(/[a-z']+/g) || [];
    for(let w of words){
      w = w.replace(/^'+|'+$/g,'');
      if(w.length < 3) continue;
      if(STOPWORDS.has(w)) continue;
      m.set(w, (m.get(w) || 0) + 1);
    }
  }
  return freq;
}

function rectsOverlap(a, b){
  return !(a.x1 < b.x0 || a.x0 > b.x1 || a.y1 < b.y0 || a.y0 > b.y1);
}

async function renderCloud(freqByCategory, container){
  const W = 920, H = 560, cx = W/2, cy = H/2;
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("id", "cloudSvg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("width", "100%");
  container.innerHTML = '';
  container.appendChild(svg);

  // Flatten into one list of {word, count, category}, one entry per
  // (word, category) pair — so "love" can appear once per text layer.
  let entries = [];
  for(const [category, m] of freqByCategory.entries()){
    for(const [word, count] of m.entries()){
      entries.push({ word, count, category });
    }
  }
  entries.sort((a,b) => b.count - a.count);
  if(entries.length === 0) return 0;

  const maxFreq = entries[0].count;
  const minSize = 22, maxSize = 78;

  await document.fonts.ready;

  const placed = [];
  let placedCount = 0;

  entries.forEach(({word, count, category}, idx) => {
    // Proportional to sqrt(count)/sqrt(maxFreq): a single occurrence stays
    // legible instead of being crushed toward minSize by a min–max rescale.
    const t = Math.sqrt(count) / Math.sqrt(maxFreq);
    const size = minSize + (maxSize - minSize) * t;
    const rankTier = idx === 0 ? 0 : idx < 8 ? 1 : idx < 24 ? 2 : 3;
    const color = (CATEGORIES[category] || CATEGORIES.unclassified).color;
    const family = rankTier <= 1 ? "'Cormorant SC', serif" : "'EB Garamond', serif";
    const weight = rankTier === 0 ? 700 : rankTier === 1 ? 600 : 400;
    const fontStyle = rankTier === 3 ? "italic" : "normal";

    const textEl = document.createElementNS(svgNS, "text");
    textEl.textContent = word;
    textEl.setAttribute("font-size", size);
    textEl.setAttribute("font-family", family);
    textEl.setAttribute("font-weight", weight);
    textEl.setAttribute("font-style", fontStyle);
    textEl.setAttribute("fill", color);
    textEl.setAttribute("opacity", "0");
    textEl.setAttribute("text-anchor", "middle");
    textEl.setAttribute("dominant-baseline", "middle");
    svg.appendChild(textEl);

    const bbox = textEl.getBBox();
    const padding = 3;
    const halfW = bbox.width/2 + padding, halfH = bbox.height/2 + padding;

    let placedOk = false;
    let x = cx, y = cy;
    const maxAttempts = 2200;
    for(let i = 0; i < maxAttempts; i++){
      const theta = 0.35 * i;
      const r = 2.6 * theta;
      x = cx + r * Math.cos(theta);
      y = cy + r * Math.sin(theta);
      const cand = { x0: x-halfW, x1: x+halfW, y0: y-halfH, y1: y+halfH };
      if(cand.x0 < 4 || cand.x1 > W-4 || cand.y0 < 4 || cand.y1 > H-4){ continue; }
      let ok = true;
      for(const p of placed){ if(rectsOverlap(cand, p)){ ok = false; break; } }
      if(ok){ placed.push(cand); placedOk = true; break; }
    }

    if(placedOk){
      textEl.setAttribute("x", x);
      textEl.setAttribute("y", y);
      textEl.setAttribute("opacity", "1");
      const title = document.createElementNS(svgNS, "title");
      title.textContent = `${word} — ${count}× — ${(CATEGORIES[category] || CATEGORIES.unclassified).label}`;
      textEl.appendChild(title);
      placedCount++;
    } else {
      svg.removeChild(textEl);
    }
  });

  return placedCount;
}

function renderList(categorized, container){
  const details = document.createElement('details');
  const summary = document.createElement('summary');
  summary.textContent = `show the ${categorized.length} underlying annotations`;
  details.appendChild(summary);
  for(const { ann, category } of categorized){
    const target = (ann.target && ann.target[0]) || {};
    const tq = (target.selector || []).find(s => s.type === 'TextQuoteSelector');
    const quote = tq ? tq.exact : '';
    const user = (ann.user || '').replace('acct:','').split('@')[0];
    const link = (ann.links && (ann.links.incontext || ann.links.html)) || '#';
    const catInfo = CATEGORIES[category] || CATEGORIES.unclassified;
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      ${quote ? `<div class="lemma">&laquo;${escapeHtml(quote)}&raquo;</div>` : ''}
      <div>${escapeHtml(ann.text || '(no gloss text)')}</div>
      <div class="meta"><span style="color:${category==='unclassified' ? catInfo.color : catInfo.color}">${escapeHtml(catInfo.label)}</span> &middot; <strong>${escapeHtml(user)}</strong> &middot; <a href="${link}" target="_blank" rel="noopener">open ↗</a></div>`;
    details.appendChild(div);
  }
  container.appendChild(details);
}

async function load(){
  mainEl.innerHTML = '<p class="empty">Loading annotations…</p>';
  statusEl.textContent = 'querying the API…';
  try{
    const categorized = await fetchAllCategorized();
    if(categorized.length === 0){
      mainEl.innerHTML = '<p class="empty">No annotations found across the three sources.</p>';
      statusEl.textContent = 'no data.';
      return;
    }
    const freqByCategory = buildFrequencies(categorized);

    mainEl.innerHTML = '';
    const cloudWrap = document.createElement('div');
    cloudWrap.id = 'cloudWrap';
    mainEl.appendChild(cloudWrap);

    const placedCount = await renderCloud(freqByCategory, cloudWrap);
    renderList(categorized, mainEl);

    const uniqueWords = new Set();
    for(const m of freqByCategory.values()) for(const w of m.keys()) uniqueWords.add(w);
    statusEl.textContent = `${categorized.length} annotations · ${uniqueWords.size} unique words · ${placedCount} placed in the cloud.`;
  }catch(err){
    mainEl.innerHTML = `<p class="error">Error: ${escapeHtml(err.message)}</p>`;
    statusEl.textContent = 'error.';
  }
}

document.getElementById('reload').addEventListener('click', load);
refreshChip();
renderLegend();
load();
</script>

</body>
</html>
